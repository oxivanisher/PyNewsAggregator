<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyNewsAggregator</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
</head>
<body>

<header class="app-header">
  <span class="app-title">📰 News</span>
  <div class="header-actions">
    <button class="btn-ghost" onclick="markAllRead()" title="Mark all as read">✓ All read</button>
    <button class="btn-ghost" onclick="openTokenModal()" title="Manage sync token">⇄ Token</button>
  </div>
</header>


<main id="article-list"
      hx-get="/articles"
      hx-trigger="load"
      hx-swap="innerHTML">
  <div class="loading">Loading…</div>
</main>

<footer class="app-footer">
  <a href="https://github.com/oxivanisher/PyNewsAggregator/commit/{{ git_commit }}"
     target="_blank" rel="noopener noreferrer">{{ git_commit }}</a>
</footer>

<!-- Token modal -->
<div id="token-modal" class="modal-backdrop hidden" onclick="closeTokenModal(event)">
  <div class="modal">
    <h2>Sync Token</h2>
    <p class="modal-hint">Use the same token on all your devices to share read state.</p>

    <div class="token-display">
      <code id="token-value"></code>
      <button class="btn-secondary" onclick="copyToken()">Copy</button>
    </div>

    <hr>

    <form method="POST" action="/token/import">
      <label for="import-input">Import token</label>
      <div class="import-row">
        <input id="import-input" name="token" type="text" placeholder="Paste token here…" autocomplete="off">
        <button class="btn-primary" type="submit">Apply</button>
      </div>
    </form>

    <hr>

    <form method="POST" action="/token/new" onsubmit="return confirm('This creates a fresh token with no read history. Continue?')">
      <button class="btn-danger" type="submit">Generate new token</button>
    </form>

    <button class="modal-close" onclick="closeTokenModal()">✕</button>
  </div>
</div>

<script>
  // ── token ──────────────────────────────────────────────────────────────────
  function openTokenModal() {
    fetch('/token/export')
      .then(r => r.json())
      .then(data => {
        document.getElementById('token-value').textContent = data.token || '(none)';
        document.getElementById('token-modal').classList.remove('hidden');
      });
  }

  function closeTokenModal(e) {
    if (!e || e.target.id === 'token-modal' || e.target.classList.contains('modal-close')) {
      document.getElementById('token-modal').classList.add('hidden');
    }
  }

  function copyToken() {
    const val = document.getElementById('token-value').textContent;
    navigator.clipboard.writeText(val).then(() => {
      const btn = document.querySelector('.token-display .btn-secondary');
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
    });
  }

  // ── mark all read ──────────────────────────────────────────────────────────
  function markAllRead() {
    fetch('/watermark', {method: 'POST', redirect: 'manual'}).then(() => {
      // Re-render the article list
      htmx.ajax('GET', '/articles', {target: '#article-list', swap: 'innerHTML'});
      hideBanner();
    });
  }

  // ── new-article tracking ───────────────────────────────────────────────────
  let newestId = 0;
  let prependPending = false;

  function syncNewestId() {
    const marker = document.getElementById('newest-marker');
    if (marker) { newestId = parseInt(marker.dataset.id, 10) || 0; return; }
    const first = document.querySelector('#article-list .news-item');
    if (first) newestId = parseInt(first.id.replace('article-', ''), 10) || 0;
  }

  document.addEventListener('htmx:afterSettle', syncNewestId);

  async function prependNew() {
    if (newestId === 0 || prependPending) return;
    prependPending = true;
    try {
      const resp = await fetch('/articles/prepend?since_id=' + newestId);
      const html = await resp.text();
      if (!html.trim()) return;

      const list = document.getElementById('article-list');

      // Anchor scroll to the first existing item so we don't jump
      const anchor = list.querySelector('.news-item, .watermark-divider, #load-more, .end-of-feed');
      const anchorTop = anchor ? anchor.getBoundingClientRect().top : null;

      list.insertAdjacentHTML('afterbegin', html);
      htmx.process(list);   // wire up hx-trigger="intersect/load" on new items

      // Update newestId from the new first article
      const newFirst = list.querySelector('.news-item');
      if (newFirst) newestId = parseInt(newFirst.id.replace('article-', ''), 10) || newestId;

      // Compensate scroll so the user's reading position doesn't jump
      if (anchor && anchorTop !== null && window.scrollY > 0) {
        window.scrollBy(0, anchor.getBoundingClientRect().top - anchorTop);
      }
    } catch (_) {}
    finally { prependPending = false; }
  }

  // ── SSE: silently prepend when server pushes new articles ─────────────────
  let sseReady = false;
  let prependTimer = null;

  function schedulePrepend() {
    // debounce: if multiple SSE events arrive in quick succession, batch them
    clearTimeout(prependTimer);
    prependTimer = setTimeout(prependNew, 400);
  }

  function connectSSE() {
    const src = new EventSource('/events');
    src.onopen = () => { if (sseReady) schedulePrepend(); sseReady = true; };
    src.onmessage = (e) => {
      try { if (JSON.parse(e.data).new_articles) schedulePrepend(); } catch (_) {}
    };
  }
  connectSSE();

  // ── focus check: catch up when tab regains visibility ─────────────────────
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') prependNew();
  });

  // ── article expand/collapse ────────────────────────────────────────────────
  function closeAll(exceptId) {
    document.querySelectorAll('#article-list .article-body:not(.hidden)').forEach(body => {
      const thisId = body.id.replace('body-', '');
      if (thisId === String(exceptId)) return;
      body.classList.add('hidden');
      const article = document.querySelector('#article-' + thisId);
      article.querySelector('.chevron').textContent = '▶';
      article.classList.remove('expanded');
    });
  }

  function toggleArticle(id, readMode) {
    const body = document.getElementById('body-' + id);
    const item = document.getElementById('article-' + id);
    const chevron = item.querySelector('.chevron');
    const isOpen = !body.classList.contains('hidden');

    if (isOpen) {
      body.classList.add('hidden');
      chevron.textContent = '▶';
      item.classList.remove('expanded');
    } else {
      closeAll(id);
      body.classList.remove('hidden');
      chevron.textContent = '▼';
      item.classList.add('expanded');
      if (readMode === 'expand' && !item.classList.contains('read')) {
        markRead(id, item);
      }
    }
  }

  function markRead(id, itemEl) {
    if (!itemEl) itemEl = document.getElementById('article-' + id);
    if (itemEl && itemEl.classList.contains('read')) return;
    fetch('/read/' + id, {method: 'POST'});
    if (itemEl) {
      itemEl.classList.add('read');
      const dot = itemEl.querySelector('.dot');
      if (dot) dot.textContent = '○';
    }
  }

  // scroll/load read mode: called by htmx on intersect/load via hx-on
  function markReadFromHtmx(id) {
    markRead(id, document.getElementById('article-' + id));
  }
</script>
</body>
</html>
