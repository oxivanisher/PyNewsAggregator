<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="News">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <script>
    // Apply saved theme before first paint to prevent flash
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
</head>
<body>

<header class="app-header">
  <button class="app-title-btn" onclick="markAllRead()" title="Mark all as read">
    📰 News <span id="unread-badge" class="unread-badge"></span>
  </button>
  <span id="refresh-timer" class="refresh-timer"></span>
  <button class="btn-ghost btn-settings" onclick="openSettingsModal()" title="Settings">⚙</button>
</header>


<main id="article-list"
      hx-get="/articles"
      hx-trigger="load"
      hx-swap="innerHTML">
  <div class="loading">Loading…</div>
</main>

<button class="fab-next" onclick="nextUnread()" title="Next unread (n / j)">&#9733;</button>

<footer class="app-footer">
  <a href="https://github.com/oxivanisher/PyNewsAggregator/commit/{{ git_commit }}"
     target="_blank" rel="noopener noreferrer">{{ git_commit }}</a>
</footer>

<!-- Settings modal -->
<div id="settings-modal" class="modal-backdrop hidden" onclick="closeSettingsModal(event)">
  <div class="modal">
    <h2>Settings</h2>
    <button class="modal-close" onclick="closeSettingsModal()">✕</button>

    <h3 class="settings-section-title">Theme</h3>
    <div class="theme-picker">
      <button class="btn-secondary" id="theme-btn-auto"  onclick="applyTheme('auto')">◑ Auto</button>
      <button class="btn-secondary" id="theme-btn-light" onclick="applyTheme('light')">☀ Light</button>
      <button class="btn-secondary" id="theme-btn-dark"  onclick="applyTheme('dark')">☾ Dark</button>
    </div>

    <h3 class="settings-section-title">Sources</h3>
    <div id="feeds-list" class="feeds-list"></div>

    <h3 class="settings-section-title">App</h3>
    <button id="install-btn" class="btn-secondary" onclick="installApp()" style="display:none; width:100%; margin-bottom:0.5rem">
      ⊕ Add to Home Screen
    </button>
    <div id="notif-wrap">
      <p class="modal-hint" id="notif-status" style="margin-bottom:0.4rem"></p>
      <button id="notif-btn" class="btn-secondary" style="display:none; width:100%"></button>
    </div>

    <h3 class="settings-section-title">Sync Token</h3>
    <p class="modal-hint">Use the same token on all your devices to share read state.</p>
    <div class="token-display">
      <code id="token-value"></code>
      <button class="btn-secondary" onclick="copyToken()">Copy</button>
    </div>
    <form method="POST" action="/token/import">
      <label for="import-input">Import token</label>
      <div class="import-row">
        <input id="import-input" name="token" type="text" placeholder="Paste token here…" autocomplete="off">
        <button class="btn-primary" type="submit">Apply</button>
      </div>
    </form>
    <form method="POST" action="/token/new" onsubmit="return confirm('This creates a fresh token with no read history. Continue?')">
      <button class="btn-danger" type="submit">Generate new token</button>
    </form>
  </div>
</div>

<script>
  // ── theme ──────────────────────────────────────────────────────────────────
  function applyTheme(theme) {
    if (theme === 'auto') {
      document.documentElement.removeAttribute('data-theme');
      localStorage.removeItem('theme');
    } else {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }
    syncThemeButtons();
  }

  function currentTheme() {
    return document.documentElement.getAttribute('data-theme') || 'auto';
  }

  function syncThemeButtons() {
    const t = currentTheme();
    ['auto', 'light', 'dark'].forEach(name => {
      const btn = document.getElementById('theme-btn-' + name);
      if (btn) btn.classList.toggle('theme-btn-active', name === t);
    });
  }

  // ── settings modal ─────────────────────────────────────────────────────────
  function openSettingsModal() {
    document.getElementById('settings-modal').classList.remove('hidden');
    syncThemeButtons();
    updateNotifUI();

    // Load token
    fetch('/token/export').then(r => r.json()).then(data => {
      document.getElementById('token-value').textContent = data.token || '(none)';
    });

    // Load feeds
    const list = document.getElementById('feeds-list');
    list.innerHTML = '<p class="modal-hint">Loading…</p>';
    fetch('/feeds').then(r => r.json()).then(feeds => {
      if (!feeds.length) { list.innerHTML = '<p class="modal-hint">No feeds configured.</p>'; return; }
      list.innerHTML = feeds.map(f => {
        const interval = f.check_interval >= 3600
          ? `${Math.round(f.check_interval / 3600)}h`
          : `${Math.round(f.check_interval / 60)}m`;
        const fetched = f.last_fetched_at ? timeAgoClient(f.last_fetched_at) : 'never';
        return `<div class="feed-row${f.hidden ? ' feed-row--hidden' : ''}" id="feed-row-${f.id}">
          <div class="feed-row-header">
            <span class="feed-row-name">${escHtml(f.name)}</span>
            <label class="feed-toggle" title="${f.hidden ? 'Hidden — click to show' : 'Visible — click to hide'}">
              <input type="checkbox" ${f.hidden ? '' : 'checked'} onchange="toggleFeedHidden(${f.id}, this)">
              <span class="feed-toggle-label">${f.hidden ? 'hidden' : 'visible'}</span>
            </label>
          </div>
          <div class="feed-row-meta">
            <a href="${escHtml(f.url)}" target="_blank" rel="noopener noreferrer" class="feed-row-url">${escHtml(f.url)}</a>
            <span class="feed-row-stats">${f.article_count} articles &nbsp;·&nbsp; every ${interval} &nbsp;·&nbsp; fetched ${fetched}</span>
          </div>
        </div>`;
      }).join('');
    }).catch(() => { list.innerHTML = '<p class="modal-hint">Failed to load feeds.</p>'; });
  }

  function closeSettingsModal(e) {
    if (!e || e.target.id === 'settings-modal' || e.target.classList.contains('modal-close')) {
      document.getElementById('settings-modal').classList.add('hidden');
    }
  }

  async function toggleFeedHidden(feedId, checkbox) {
    checkbox.disabled = true;
    try {
      const { hidden } = await fetch(`/feeds/${feedId}/toggle`, {method: 'POST'}).then(r => r.json());
      checkbox.checked = !hidden;
      const row = document.getElementById('feed-row-' + feedId);
      if (row) {
        row.classList.toggle('feed-row--hidden', hidden);
        const lbl = row.querySelector('.feed-toggle-label');
        if (lbl) lbl.textContent = hidden ? 'hidden' : 'visible';
        const tog = row.querySelector('.feed-toggle');
        if (tog) tog.title = hidden ? 'Hidden — click to show' : 'Visible — click to hide';
      }
      htmx.ajax('GET', '/articles', {target: '#article-list', swap: 'innerHTML'});
      updateUnreadCount();
    } finally {
      checkbox.disabled = false;
    }
  }

  function copyToken() {
    const val = document.getElementById('token-value').textContent;
    navigator.clipboard.writeText(val).then(() => {
      const btn = document.querySelector('.token-display .btn-secondary');
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
    });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── mark all read ──────────────────────────────────────────────────────────
  function markAllRead() {
    fetch('/watermark', {method: 'POST', redirect: 'manual'}).then(() => {
      htmx.ajax('GET', '/articles', {target: '#article-list', swap: 'innerHTML'});
      hideBanner();
      updateUnreadCount();
    });
  }

  // ── new-article tracking ───────────────────────────────────────────────────
  let newestId = 0;
  let prependPending = false;

  function syncNewestId() {
    const marker = document.getElementById('newest-marker');
    if (marker) { newestId = parseInt(marker.dataset.id, 10) || 0; return; }
    const first = document.querySelector('#article-list .news-item');
    if (first) newestId = parseInt(first.id.replace('article-', ''), 10) || 0;
  }

  document.addEventListener('htmx:afterSettle', syncNewestId);

  // Auto-jump to oldest unread once the article list first loads
  let _autoJumpDone = false;
  document.addEventListener('htmx:afterSettle', (e) => {
    if (_autoJumpDone || e.target.id !== 'article-list') return;
    _autoJumpDone = true;
    nextUnread();
  });

  async function prependNew() {
    if (newestId === 0 || prependPending) return;
    prependPending = true;
    try {
      const resp = await fetch('/articles/prepend?since_id=' + newestId);
      const html = await resp.text();
      if (!html.trim()) return;

      const list = document.getElementById('article-list');

      list.insertAdjacentHTML('afterbegin', html);
      htmx.process(list);   // wire up hx-trigger="intersect/load" on new items

      // Update newestId from the new first article
      const newFirst = list.querySelector('.news-item');
      if (newFirst) newestId = parseInt(newFirst.id.replace('article-', ''), 10) || newestId;

      // Scroll to top so the user sees new articles arrive
      window.scrollTo({ top: 0, behavior: 'smooth' });
      updateUnreadCount();
    } catch (_) {}
    finally { prependPending = false; }
  }

  // ── SSE: silently prepend when server pushes new articles ─────────────────
  let sseReady = false;
  let prependTimer = null;

  function schedulePrepend() {
    // debounce: if multiple SSE events arrive in quick succession, batch them
    clearTimeout(prependTimer);
    prependTimer = setTimeout(prependNew, 400);
  }

  function connectSSE() {
    const src = new EventSource('/events');
    src.onopen = () => { if (sseReady) { schedulePrepend(); fetchStatus(); syncReadState(); } sseReady = true; };
    src.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.new_articles) { schedulePrepend(); fetchStatus(); }
        if (data.read_article != null) markReadInDom(data.read_article);
        if (data.watermark)    markWatermarkInDom(data.watermark);
      } catch (_) {}
    };
  }
  connectSSE();

  function markReadInDom(id) {
    const item = document.getElementById('article-' + id);
    if (!item) { scheduleUnreadCount(); return; }  // not in DOM yet, but server count changed
    if (item.classList.contains('read')) return;
    item.classList.add('read');
    const dot = item.querySelector('.dot');
    if (dot) dot.textContent = '○';
    scheduleUnreadCount();
  }

  function markWatermarkInDom(isoTs) {
    const wm = new Date(isoTs).getTime();
    document.querySelectorAll('#article-list .news-item:not(.read)').forEach(item => {
      const timeEl = item.querySelector('.article-time[data-published]');
      if (!timeEl) return;
      if (new Date(timeEl.dataset.published).getTime() <= wm) {
        item.classList.add('read');
        const dot = item.querySelector('.dot');
        if (dot) dot.textContent = '○';
      }
    });
    scheduleUnreadCount();
  }

  // ── cross-device read-state sync ───────────────────────────────────────────
  async function syncReadState() {
    const unreadEls = document.querySelectorAll('#article-list .news-item:not(.read)');
    const ids = Array.from(unreadEls).map(el => el.id.replace('article-', '')).filter(Boolean);
    try {
      const qs = ids.length ? '?ids=' + ids.join(',') : '';
      const { read_ids, watermark } = await fetch('/read-state' + qs).then(r => r.json());
      read_ids.forEach(id => markReadInDom(id));
      if (watermark) markWatermarkInDom(watermark);
      scheduleUnreadCount();
    } catch (_) {}
  }

  // ── focus check: catch up when tab/app regains visibility ────────────────
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') { prependNew(); fetchStatus(); syncReadState(); }
  });
  // pageshow fires on bfcache restores (iOS PWA freezes/thaws pages instead of
  // hiding them, so visibilitychange is often skipped — pageshow is more reliable)
  window.addEventListener('pageshow', async (e) => {
    if (!e.persisted) return;
    await prependNew();
    fetchStatus();
    // nextUnread() calls syncReadState() internally before jumping
    if (!document.querySelector('#article-list .news-item.expanded')) nextUnread();
    else syncReadState();
  });

  // ── timestamps + refresh countdown ────────────────────────────────────────
  function timeAgoClient(isoStr) {
    const s = Math.floor((Date.now() - new Date(isoStr)) / 1000);
    if (s < 60)    return 'just now';
    if (s < 3600)  return `${Math.floor(s / 60)}min ago`;
    if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
    return `${Math.floor(s / 86400)}d ago`;
  }

  function updateTimestamps() {
    document.querySelectorAll('.article-time[data-published]').forEach(el => {
      el.textContent = timeAgoClient(el.dataset.published);
    });
  }

  let refreshCountdown = null;
  let _refreshPoll = null;

  async function fetchStatus() {
    try {
      const d = await fetch('/status').then(r => r.json());
      refreshCountdown = d.next_refresh_in ?? null;
      renderTimer();
    } catch (_) {}
  }

  function renderTimer() {
    const el = document.getElementById('refresh-timer');
    if (!el) return;
    if (refreshCountdown === null) { el.textContent = ''; return; }
    if (refreshCountdown > 0) {
      el.textContent = `next: ${Math.ceil(refreshCountdown / 60)}m`;
      // Job has fired — stop aggressive polling if it was running
      if (_refreshPoll) { clearInterval(_refreshPoll); _refreshPoll = null; }
      return;
    }
    // Countdown expired: show refreshing and poll every 3 s until the scheduler
    // sets a new next_run_time (which it does as soon as the job starts).
    el.textContent = 'refreshing…';
    if (!_refreshPoll) {
      _refreshPoll = setInterval(fetchStatus, 3000);
    }
  }

  async function updateUnreadCount() {
    try {
      const { unread } = await fetch('/unread-count').then(r => r.json());
      // If an unread article is currently open, the user is reading it — don't count it
      const reading = document.querySelector('#article-list .news-item.expanded:not(.read)');
      const displayed = reading ? Math.max(0, unread - 1) : unread;
      document.title = displayed > 0 ? `(${displayed}) News` : 'News';
      const badge = document.getElementById('unread-badge');
      if (badge) badge.textContent = displayed > 0 ? displayed : '';
    } catch (_) {}
  }

  let tickCycle = 0;
  setInterval(() => {
    tickCycle++;
    updateTimestamps();
    updateUnreadCount();
    if (refreshCountdown !== null) refreshCountdown -= 30;
    if (tickCycle % 10 === 0) fetchStatus(); // re-sync every ~5 min
    else renderTimer();
  }, 30000);

  fetchStatus();
  updateTimestamps();
  updateUnreadCount();

  // ── article expand/collapse ────────────────────────────────────────────────
  function closeAll(exceptId) {
    document.querySelectorAll('#article-list .article-body:not(.hidden)').forEach(body => {
      const thisId = body.id.replace('body-', '');
      if (thisId === String(exceptId)) return;
      body.classList.add('hidden');
      const article = document.querySelector('#article-' + thisId);
      if (!article) return;
      article.querySelector('.chevron').textContent = '▶';
      article.classList.remove('expanded');
      // Mark as read when another article is opened (expand mode only)
      if (article.dataset.readMode === 'expand') markRead(parseInt(thisId), article);
    });
  }

  function toggleArticle(id, readMode) {
    const body = document.getElementById('body-' + id);
    const item = document.getElementById('article-' + id);
    const chevron = item.querySelector('.chevron');
    const isOpen = !body.classList.contains('hidden');

    if (isOpen) {
      body.classList.add('hidden');
      chevron.textContent = '▶';
      item.classList.remove('expanded');
      // Mark as read when explicitly closed (expand mode only)
      if (readMode === 'expand') markRead(id, item);
    } else {
      closeAll(id);
      body.classList.remove('hidden');
      chevron.textContent = '▼';
      item.classList.add('expanded');
      scheduleUnreadCount(); // update tab title to reflect article being read
    }
  }

  let _unreadCountTimer = null;
  function scheduleUnreadCount() {
    clearTimeout(_unreadCountTimer);
    _unreadCountTimer = setTimeout(updateUnreadCount, 800);
  }

  async function markRead(id, itemEl) {
    if (!itemEl) itemEl = document.getElementById('article-' + id);
    if (itemEl?.classList.contains('read')) return;
    if (itemEl) {
      itemEl.classList.add('read');
      const dot = itemEl.querySelector('.dot');
      if (dot) dot.textContent = '○';
    }
    // Wait for the server to confirm before refreshing the count —
    // otherwise the count fetch races the POST and may read stale data.
    try { await fetch('/read/' + id, { method: 'POST' }); } catch (_) {}
    scheduleUnreadCount();
  }

  // scroll/load read mode: called by htmx on intersect/load via hx-on
  function markReadFromHtmx(id) {
    markRead(id, document.getElementById('article-' + id));
  }

  // ── next unread ────────────────────────────────────────────────────────────
  function _findOldestUnread() {
    const all = document.querySelectorAll('#article-list .news-item');
    for (let i = all.length - 1; i >= 0; i--) {
      if (!all[i].classList.contains('read') && !all[i].classList.contains('expanded')) {
        return all[i];
      }
    }
    return null;
  }

  function _openAndScrollTo(target) {
    const all = Array.from(document.querySelectorAll('#article-list .news-item'));
    const id = parseInt(target.id.replace('article-', ''), 10);
    const readMode = target.dataset.readMode || 'expand';
    const idx = all.indexOf(target);
    const aboveEl = idx > 0 ? all[idx - 1] : null;
    const headerH = (document.querySelector('.app-header')?.offsetHeight) || 56;
    toggleArticle(id, readMode);
    // Double rAF: first frame kicks off the reflow from closeAll + expand,
    // second frame measures stable post-reflow geometry before scrolling.
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const anchor = aboveEl || target;
      const top = anchor.getBoundingClientRect().top + window.scrollY - headerH;
      window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    }));
  }

  async function _loadPagesUntil(articleId) {
    for (let i = 0; i < 20; i++) {
      if (document.getElementById('article-' + articleId)) return;
      const loadMore = document.getElementById('load-more');
      if (!loadMore) return;
      const url = loadMore.getAttribute('hx-get');
      if (!url) return;
      const html = await fetch(url).then(r => r.text());
      loadMore.outerHTML = html;
      htmx.process(document.getElementById('article-list'));
    }
  }

  async function nextUnread() {
    await syncReadState();
    const target = _findOldestUnread();
    if (target) { _openAndScrollTo(target); return; }

    // Nothing unread in the current DOM — ask the server if anything exists below the fold
    try {
      const { id } = await fetch('/next-unread').then(r => r.json());
      if (!id) return;
      await _loadPagesUntil(id);
      const el = document.getElementById('article-' + id);
      if (el && !el.classList.contains('expanded')) _openAndScrollTo(el);
    } catch (_) {}
  }

  document.addEventListener('keydown', (e) => {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target.isContentEditable) return;
    if (e.altKey || e.ctrlKey || e.metaKey) return;
    if (e.key.toLowerCase() === 'n' || e.key.toLowerCase() === 'j') nextUnread();
  });

  // ── PWA install prompt ─────────────────────────────────────────────────────
  let _installPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _installPrompt = e;
    const btn = document.getElementById('install-btn');
    if (btn) btn.style.display = '';
  });
  window.addEventListener('appinstalled', () => {
    _installPrompt = null;
    const btn = document.getElementById('install-btn');
    if (btn) btn.style.display = 'none';
  });

  async function installApp() {
    if (!_installPrompt) return;
    _installPrompt.prompt();
    const { outcome } = await _installPrompt.userChoice;
    if (outcome === 'accepted') {
      _installPrompt = null;
      const btn = document.getElementById('install-btn');
      if (btn) btn.style.display = 'none';
    }
  }

  // ── push notifications ─────────────────────────────────────────────────────
  let _swReg = null;

  (async function initSW() {
    if (!('serviceWorker' in navigator)) return;
    try {
      _swReg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
    } catch (e) { console.warn('SW registration failed', e); }
  })();

  function _urlBase64ToUint8Array(b64) {
    const pad = '='.repeat((4 - b64.length % 4) % 4);
    const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
    return new Uint8Array([...raw].map(c => c.charCodeAt(0)));
  }

  async function updateNotifUI() {
    const status = document.getElementById('notif-status');
    const btn = document.getElementById('notif-btn');
    if (!status || !btn) return;

    if (!('PushManager' in window) || !_swReg) {
      status.textContent = 'Push notifications are not supported by this browser.';
      btn.style.display = 'none';
      return;
    }

    const sub = await _swReg.pushManager.getSubscription().catch(() => null);
    const perm = Notification.permission;

    if (sub) {
      status.textContent = 'Push notifications are enabled.';
      btn.textContent = 'Disable notifications';
      btn.className = 'btn-danger';
      btn.style.display = '';
      btn.onclick = unsubscribePush;
    } else if (perm === 'denied') {
      status.textContent = 'Notifications are blocked in browser settings.';
      btn.style.display = 'none';
    } else {
      status.textContent = 'Get notified when new articles arrive.';
      btn.textContent = 'Enable notifications';
      btn.className = 'btn-secondary';
      btn.style.display = '';
      btn.onclick = subscribePush;
    }
  }

  async function subscribePush() {
    if (!_swReg) return;
    try {
      const { public_key } = await fetch('/vapid-public-key').then(r => r.json());
      const sub = await _swReg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: _urlBase64ToUint8Array(public_key),
      });
      await fetch('/push/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(sub.toJSON()),
      });
      updateNotifUI();
    } catch (e) {
      console.error('Push subscribe failed', e);
      updateNotifUI();
    }
  }

  async function unsubscribePush() {
    if (!_swReg) return;
    const sub = await _swReg.pushManager.getSubscription().catch(() => null);
    if (sub) {
      await sub.unsubscribe();
      await fetch('/push/subscribe', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ endpoint: sub.endpoint }),
      });
    }
    updateNotifUI();
  }
</script>
</body>
</html>
